services:
  - type: web
    name: alice-skill
    runtime: node
    rootDir: alice-skill
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: LLM_PROVIDER
        value: mock
      - key: LLM_TIMEOUT_MS
        value: 6000
      - key: OPENCLAW_TRANSPORT
        value: mock-rpc
